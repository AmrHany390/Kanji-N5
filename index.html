<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanji Flashcards</title>
<style>
  body{background:#111;color:#eee;font-family:sans-serif;text-align:center;margin:0;padding:20px;}
  h1{font-size:1.3em;}
  #counter{margin-bottom:10px;color:#aaa;}
  
  /* Deck Selector Styling */
  .deck-selector {margin-bottom:20px; display:flex; justify-content:center; gap:8px; flex-wrap:wrap;}
  .deck-btn {background:#222;color:#999;border:1px solid #333;padding:6px 14px;border-radius:14px;font-size:.85em;cursor:pointer;}
  .deck-btn.active {background:#8cf;color:#111;border-color:#8cf;font-weight:bold;}

  .modes{margin-bottom:16px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
  .mode-btn{background:#222;color:#999;border:1px solid #333;padding:8px 14px;border-radius:20px;
            font-size:.9em;cursor:pointer;}
  .mode-btn.active{background:#4a7;color:#111;border-color:#4a7;font-weight:bold;}
  
  .card{background:#1e1e1e;border-radius:16px;padding:30px;max-width:480px;margin:0 auto;
        min-height:380px;display:flex;flex-direction:column;justify-content:center;align-items:center;
        box-shadow:0 4px 20px rgba(0,0,0,.5); position: relative;}
  .card.flashcard{cursor:pointer;}
  .kanji{font-size:5em;margin-bottom:10px;}
  .meaning{font-size:1.3em;color:#f88;margin-bottom:15px;}
  .readings{font-size:1em;color:#8cf;margin-bottom:15px;line-height:1.6;}
  
  /* Furigana & Sentence Styling */
  .words{font-size:1em;color:#ddd;line-height:2.2;max-height:200px;overflow-y:auto;}
  .sentence-display {font-size: 2.2em; line-height: 1.6; margin-bottom: 10px; font-weight: bold;}
  .sentence-translation {font-size: 1.2em; color: #f88; margin-top: 10px;}
  rt { font-size: 0.55em; color: #8cf; }

  .hint{color:#666;font-size:.85em;margin-top:15px;}
  .nav{margin-top:20px;}
  button{background:#333;color:#eee;border:none;padding:10px 20px;margin:5px;border-radius:8px;font-size:1em;cursor:pointer; transition: background 0.2s;}
  button:hover{background:#444;}
  .front-only{color:#888;font-size:.9em;}
  .prompt-label{color:#888;font-size:.95em;margin-bottom:6px;}
  .prompt-main{font-size:2.2em;margin-bottom:6px;}
  .quiz-meaning{font-size:1.6em;color:#f88;margin-bottom:10px;padding:0 10px;}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px;margin-top:10px;}
  .opt-btn{background:#2a2a2a;color:#eee;border:1px solid #3a3a3a;border-radius:10px;
           padding:14px 8px;font-size:1.3em;cursor:pointer;}
  .opt-btn:hover{background:#333;}
  .opt-btn.correct{background:#2d5a2d;border-color:#4a4;}
  .opt-btn.wrong{background:#5a2d2d;border-color:#a44;}
  .opt-btn[disabled]{cursor:default;}
  .feedback{margin-top:14px;font-size:1em;min-height:1.4em;}
  .feedback.correct-text{color:#8f8;}
  .feedback.wrong-text{color:#f88;}
  .score{color:#aaa;font-size:.9em;margin-top:4px;}

  /* Stroke Order Mode */
  .stroke-card{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .stroke-kanji-display{font-size:3.5em;margin-bottom:2px;}
  .stroke-meaning{font-size:1.1em;color:#f88;}
  .stroke-readings{font-size:.9em;color:#8cf;line-height:1.6;}
  .stroke-img-wrap{position:relative;background:#fff;border-radius:12px;padding:6px;
                   display:flex;align-items:center;justify-content:center;min-height:180px;min-width:180px;}
  .stroke-img-wrap .stroke-loading{position:absolute;color:#555;font-size:.9em;}
  .stroke-source{font-size:.75em;color:#555;margin-top:2px;}
  .static-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;width:100%;max-width:460px;}
  .view-toggle{display:flex;gap:6px;margin-bottom:4px;}
  .view-toggle button{font-size:.8em;padding:5px 12px;border-radius:12px;background:#222;border:1px solid #444;color:#aaa;cursor:pointer;}
  .view-toggle button.active{background:#4a7;color:#111;border-color:#4a7;font-weight:bold;}
  
  /* Pause Button Specifics */
  .pause-btn {position:absolute; bottom:8px; right:8px; background:#222; color:#eee; border:1px solid #444; border-radius:6px; padding:6px 10px; font-size:0.75em; cursor:pointer; z-index:10; font-weight:bold;}
  .pause-btn.active-pause {background:#4a7; color:#111; border-color:#4a7;}
</style>
</head>

function shuffleArr(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function setDeck(deck) {
  document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('deck-' + deck).classList.add('active');

  if(deck === 'all') {
    kanji = [...kanjiDatabase];
  } else if (deck === 'day5') {
    kanji = kanjiDatabase.filter(k => day5List.includes(k[0]));
  } else if (deck === 'day6') {
    kanji = kanjiDatabase.filter(k => day6List.includes(k[0]));
  } else if (deck === 'day7') {
    kanji = kanjiDatabase.filter(k => day7List.includes(k[0]));
  } else if (deck === 'day8') {
    kanji = kanjiDatabase.filter(k => day8List.includes(k[0]));
  } else if (deck === 'day9') {
    kanji = kanjiDatabase.filter(k => day9List.includes(k[0]));
  } else if (deck === 'day10') {
    kanji = kanjiDatabase.filter(k => day10List.includes(k[0]));
  }
  
  order = shuffleArr(kanji.map((_,i)=>i));
  idx = 0; flipped = false; score = 0; attempts = 0; answered = false;
  pickRandomSentence();
  renderNav();
  render();
}

function pickRandomSentence() {
  const data = kanji[order[idx]];
  if(Array.isArray(data[5])) {
    currentSentIdx = Math.floor(Math.random() * data[5].length);
  } else {
    currentSentIdx = 0;
  }
}

function setMode(m){
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b.dataset.mode===m));
  order = shuffleArr(kanji.map((_,i)=>i));
  idx = 0; flipped = false; score = 0; attempts = 0; answered = false;
  pickRandomSentence();
  renderNav();
  render();
}

function renderNav(){
  const nav = document.getElementById('nav');
  if(mode==='flash' || mode==='sentence' || mode==='translate'){
    nav.innerHTML = `<button onclick="prev()">◀ Prev</button>
      <button onclick="shuffleDeck()">🔀 Shuffle</button>
      <button onclick="next()">Next ▶</button>`;
  } else if(mode==='stroke'){
    nav.innerHTML = `<button onclick="strokePrev()">◀ Prev</button>
      <button onclick="shuffleDeck()">🔀 Shuffle</button>
      <button onclick="strokeNext()">Next ▶</button>`;
  } else {
    nav.innerHTML = `<button onclick="shuffleDeck()">🔀 Shuffle</button>
      <button onclick="skipQuiz()">Skip ▶</button>`;
  }
}

function render(){
  if(mode==='flash') renderFlash();
  else if(mode==='sentence') renderSentence();
  else if(mode==='translate') renderTranslate();
  else if(mode==='reading') renderReadingQuiz();
  else if(mode==='meaning') renderMeaningQuiz();
  else if(mode==='stroke') renderStroke();
}

// Format Furigana Helper: Targets Kanji followed by brackets e.g. 巨人[きょじん]
const formatFurigana = (text) => text.replace(/([\u4e00-\u9faf\u3005]+)\[([^\]]+)\]/g, '<ruby>$1<rt>$2</rt></ruby>');

// ---------- FLASHCARD MODE ----------
function renderFlash(){
  const card = document.getElementById('card');
  card.className = 'card flashcard';
  card.onclick = flip;
  const [k,meaning,on,kun,words] = kanji[order[idx]];
  document.getElementById('counter').textContent = `${idx+1} / ${kanji.length}`;

  const displayWords = formatFurigana(words).split('、').join('<br>');

  if(!flipped){
    card.innerHTML = `<div class="kanji">${k}</div><div class="front-only">Tap to reveal</div>`;
  } else {
    card.innerHTML = `<div class="kanji">${k}</div>
      <div class="meaning">${meaning}</div>
      <div class="readings">On: ${on}<br>Kun: ${kun}</div>
      <div class="words">${displayWords}</div>`;
  }
}

// ---------- SENTENCES MODE ----------
function renderSentence(){
  const card = document.getElementById('card');
  card.className = 'card flashcard';
  card.onclick = flip;
  const data = kanji[order[idx]];
  
  const sentences = Array.isArray(data[5]) ? data[5] : [data[5] || "例文[れいぶん]がありません。|No sentence available."];
  const sentenceData = sentences[currentSentIdx] || sentences[0];
  const [jap, eng] = sentenceData.split('|');

  document.getElementById('counter').textContent = `${idx+1} / ${kanji.length}`;

  if(!flipped){
    const frontText = jap.replace(/\[.*?\]/g, '');
    card.innerHTML = `
      <div class="prompt-label">Read the sentence:</div>
      <div class="sentence-display">${frontText}</div>
      <div class="front-only">Tap to reveal reading & meaning</div>`;
  } else {
    const displayJap = formatFurigana(jap);
    card.innerHTML = `
      <div class="prompt-label">Reading & Meaning:</div>
      <div class="sentence-display">${displayJap}</div>
      <div class="sentence-translation">${eng}</div>`;
  }
}

// ---------- TRANSLATE MODE ----------
function renderTranslate(){
  const card = document.getElementById('card');
  card.className = 'card';
  card.onclick = null; 
  
  const data = kanji[order[idx]];
  const [k, meaning] = data;
  
  const sentences = Array.isArray(data[5]) ? data[5] : [data[5] || "例文[れいぶん]がありません。|No sentence available."];
  const sentenceData = sentences[currentSentIdx] || sentences[0];
  const [jap, eng] = sentenceData.split('|');

  document.getElementById('counter').textContent = `${idx+1} / ${kanji.length}`;

  if(!flipped){
    card.innerHTML = `
      <div class="prompt-label">Translate & write the Kanji:</div>
      <div class="sentence-display" style="font-size:1.6em; margin:15px 0;">${eng}</div>
      <div class="hint">Target Kanji meaning: <b>${meaning}</b></div>
      
      <div style="position:relative; margin-top:20px; margin-bottom:10px;">
        <canvas id="drawing-pad" width="260" height="160" style="background:#222; border:1px solid #444; border-radius:10px; touch-action:none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);"></canvas>
        <button onclick="clearPad(event)" style="position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.6); font-size:0.8em; padding:4px 8px; border-radius:6px;" title="Clear Drawing">🗑️</button>
      </div>

      <button onclick="flip()" style="background:#4a7; color:#111; font-weight:bold; font-size: 1.1em; padding: 12px 24px;">👀 Reveal Answer</button>
    `;
    setTimeout(initDrawingPad, 50);
  } else {
    const displayJap = formatFurigana(jap);
    card.innerHTML = `
      <div class="prompt-label">Answer:</div>
      <div class="sentence-display" style="margin-top:10px; font-size:1.8em;">${displayJap}</div>
      <div class="kanji" style="font-size:3em; margin-top:15px;">${k}</div>
      <div class="meaning">${meaning}</div>
      <button onclick="next()" style="margin-top:20px; background:#4a7; color:#111; font-weight:bold; font-size: 1.1em; padding: 12px 24px;">Next Sentence ▶</button>
    `;
  }
}

// Drawing Pad Logic
function initDrawingPad() {
  const canvas = document.getElementById('drawing-pad');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let isDrawing = false;
  
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#eee';

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function start(e) {
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }
  
  function draw(e) {
    if(!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  }
  
  function stop(e) {
    if(!isDrawing) return;
    e.preventDefault();
    isDrawing = false;
  }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);

  canvas.addEventListener('touchstart', start, {passive: false});
  canvas.addEventListener('touchmove', draw, {passive: false});
  canvas.addEventListener('touchend', stop);
  canvas.addEventListener('touchcancel', stop);
}

function clearPad(e){
  if(e) e.stopPropagation();
  const canvas = document.getElementById('drawing-pad');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// Navigation Controls
function flip(){ flipped = !flipped; render(); }
function next(){ idx = (idx+1)%kanji.length; flipped=false; pickRandomSentence(); render(); }
function prev(){ idx = (idx-1+kanji.length)%kanji.length; flipped=false; pickRandomSentence(); render(); }
function shuffleDeck(){ order = shuffleArr(kanji.map((_,i)=>i)); idx = 0; flipped = false; answered = false; pickRandomSentence(); render(); }

// ---------- READING QUIZ MODE ----------
function renderReadingQuiz(){
  const card = document.getElementById('card');
  card.className = 'card';
  card.onclick = null;
  answered = false;
  document.getElementById('counter').textContent = `Score: ${score} / ${attempts}`;

  const kIndex = order[idx];
  const [k,meaning,on,kun] = kanji[kIndex];
  const testOn = Math.random() < 0.5;
  const correctAnswer = testOn ? on : kun;
  const label = testOn ? 'On-yomi (音読み)' : 'Kun-yomi (訓読み)';

  let pool = kanji.filter((_,i)=>i!==kIndex).map(row => testOn ? row[2] : row[3]);
  pool = pool.filter(r => r !== correctAnswer);
  const distractors = shuffleArr(pool).slice(0,3);
  const options = shuffleArr([correctAnswer, ...distractors]);

  card.innerHTML = `
    <div class="prompt-label">${label}?</div>
    <div class="kanji">${k}</div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="fb"></div>`;

  const optsDiv = document.getElementById('opts');
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = ()=>checkReading(btn, opt, correctAnswer, meaning);
    optsDiv.appendChild(btn);
  });
}

function checkReading(btn, chosen, correct, meaning){
  if(answered) return;
  answered = true;
  attempts++;
  const fb = document.getElementById('fb');
  const allBtns = document.querySelectorAll('#opts .opt-btn');
  allBtns.forEach(b=>{
    b.disabled = true;
    if(b.textContent === correct) b.classList.add('correct');
  });
  if(chosen === correct){
    score++;
    btn.classList.add('correct');
    fb.textContent = `Correct! (${meaning})`;
    fb.className = 'feedback correct-text';
  } else {
    btn.classList.add('wrong');
    fb.textContent = `Not quite — correct answer highlighted. (${meaning})`;
    fb.className = 'feedback wrong-text';
  }
  setTimeout(()=>{ skipQuiz(); }, 1400);
}

// ---------- MEANING QUIZ MODE ----------
function renderMeaningQuiz(){
  const card = document.getElementById('card');
  card.className = 'card';
  card.onclick = null;
  answered = false;
  document.getElementById('counter').textContent = `Score: ${score} / ${attempts}`;

  const kIndex = order[idx];
  const [correctK, meaning] = kanji[kIndex];

  let pool = kanji.filter((_,i)=>i!==kIndex).map(row => row[0]);
  const distractors = shuffleArr(pool).slice(0,3);
  const options = shuffleArr([correctK, ...distractors]);

  card.innerHTML = `
    <div class="prompt-label">Which kanji means:</div>
    <div class="quiz-meaning">${meaning}</div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="fb"></div>`;

  const optsDiv = document.getElementById('opts');
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = ()=>checkMeaning(btn, opt, correctK);
    optsDiv.appendChild(btn);
  });
}

function checkMeaning(btn, chosen, correct){
  if(answered) return;
  answered = true;
  attempts++;
  const fb = document.getElementById('fb');
  const allBtns = document.querySelectorAll('#opts .opt-btn');
  allBtns.forEach(b=>{
    b.disabled = true;
    if(b.textContent === correct) b.classList.add('correct');
  });
  if(chosen === correct){
    score++;
    btn.classList.add('correct');
    fb.textContent = 'Correct!';
    fb.className = 'feedback correct-text';
  } else {
    btn.classList.add('wrong');
    fb.textContent = 'Not quite — correct answer highlighted.';
    fb.className = 'feedback wrong-text';
  }
  setTimeout(()=>{ skipQuiz(); }, 1400);
}

function skipQuiz(){
  if(mode === 'reading' || mode === 'meaning') {
    idx = (idx+1)%kanji.length;
    if(idx===0) order = shuffleArr(kanji.map((_,i)=>i));
    render();
  }
}

// ---------- STROKE ORDER MODE ----------
let strokeView = 'animated'; // 'animated' | 'steps'

// Pause/Play Function
function togglePauseAnim() {
  isPaused = !isPaused;
  const btn = document.getElementById('pause-btn');
  if(btn) {
    btn.innerHTML = isPaused ? '▶ Play' : '⏸ Pause';
    btn.classList.toggle('active-pause', isPaused);
  }
  if(!isPaused && currentAnimState && currentAnimState.resume) {
    currentAnimState.resume();
    currentAnimState = null;
  }
}

function renderStroke(){
  const card = document.getElementById('card');
  card.className = 'card';
  card.onclick = null;
  const [k, meaning, on, kun] = kanji[order[idx]];
  document.getElementById('counter').textContent = `${idx+1} / ${kanji.length}`;

  card.innerHTML = `
    <div class="stroke-card">
      <div class="view-toggle">
        <button id="vt-animated" class="${strokeView==='animated'?'active':''}" onclick="setStrokeView('animated')">▶ Animated</button>
        <button id="vt-steps" class="${strokeView==='steps'?'active':''}" onclick="setStrokeView('steps')">📋 Step-by-Step</button>
      </div>
      <div class="stroke-kanji-display">${k}</div>
      <div class="stroke-meaning">${meaning}</div>
      <div class="stroke-readings">On: ${on} &nbsp;|&nbsp; Kun: ${kun}</div>
      <div id="stroke-visual"></div>
      <div class="stroke-source">Source: KanjiVG</div>
    </div>`;

  renderStrokeVisual(k);
}

function renderStrokeVisual(k){
  const vis = document.getElementById('stroke-visual');
  if(!vis) return;

  isPaused = false;
  currentAnimState = null;

  if(strokeView === 'animated'){
    vis.innerHTML = `
      <div class="stroke-img-wrap" style="background:#fff; min-height: 200px;">
        <span class="stroke-loading" id="sl">Loading animation…</span>
        <div id="anim-svg-container"></div>
        <button id="pause-btn" class="pause-btn" onclick="togglePauseAnim()">⏸ Pause</button>
      </div>
      <div style="color:#666;font-size:.8em;margin-top:6px;">Animated SVG (loops automatically)</div>`;
    renderAnimatedSVG(k);
  } else {
    vis.innerHTML = `<div id="steps-container" style="color:#aaa;font-size:.9em;padding:10px;">Generating steps…</div>`;
    renderStrokeSteps(k);
  }
}

async function renderAnimatedSVG(k){
  const container = document.getElementById('anim-svg-container');
  const loader = document.getElementById('sl');
  if(!container) return;

  if(animationTimeout) clearTimeout(animationTimeout);

  const cp = k.codePointAt(0).toString(16).padStart(5,'0');
  const svgUrl = `https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${cp}.svg`;

  try {
    const resp = await fetch(svgUrl);
    if(!resp.ok) throw new Error('not found');
    const svgText = await resp.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const pathsData = Array.from(doc.querySelectorAll('path')).map(p => p.getAttribute('d'));

    if(pathsData.length === 0) throw new Error('no paths');

    let svgHtml = `<svg viewBox="0 0 109 109" width="180" height="180" style="background:#fff; border-radius:6px; display:block; margin:0 auto;">`;
    pathsData.forEach((d, i) => {
      svgHtml += `<path id="anim-path-${i}" d="${d}" stroke="#111" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />`;
    });
    svgHtml += `</svg>`;

    if(loader) loader.style.display = 'none';
    container.innerHTML = svgHtml;

    setTimeout(() => {
      const paths = Array.from(container.querySelectorAll('path'));

      paths.forEach(p => {
        const length = p.getTotalLength();
        p.style.strokeDasharray = (length + 1) + 'px';
        p.style.strokeDashoffset = (length + 1) + 'px';
      });

      let currentPath = 0;

      function resetAndLoop() {
        if(!document.getElementById('anim-svg-container')) return;
        paths.forEach(p => {
          p.style.transition = 'none'; 
          const len = p.getTotalLength();
          p.style.strokeDashoffset = (len + 1) + 'px';
        });

        animationTimeout = setTimeout(() => {
          currentPath = 0;
          animateNext();
        }, 50);
      }

      function animateNext() {
        if(!document.getElementById('anim-svg-container') || document.getElementById('anim-svg-container').innerHTML === '') return;

        if(isPaused) {
          currentAnimState = { resume: animateNext };
          return;
        }

        if(currentPath >= paths.length) {
          animationTimeout = setTimeout(() => {
            if(isPaused) {
              currentAnimState = { resume: resetAndLoop };
              return;
            }
            resetAndLoop();
          }, 2000);
          return;
        }

        const p = paths[currentPath];
        p.style.transition = 'stroke-dashoffset 0.6s ease-in-out';
        p.getBoundingClientRect(); 
        p.style.strokeDashoffset = '0px'; 

        animationTimeout = setTimeout(() => {
          currentPath++;
          animateNext();
        }, 700);
      }

      animationTimeout = setTimeout(animateNext, 100);

    }, 50); 

  } catch(e){
    if(loader) loader.style.display = 'none';
    container.innerHTML = `
      <div style="color:#f88;padding:20px;font-size:.9em;text-align:center;">
        Animation unavailable.<br>
        <span style="color:#555;">Could not fetch SVG data.</span>
      </div>`;
  }
}

async function renderStrokeSteps(k){
  const container = document.getElementById('steps-container');
  if(!container) return;

  const cp = k.codePointAt(0).toString(16).padStart(5,'0');
  const svgUrl = `https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${cp}.svg`;

  try {
    const resp = await fetch(svgUrl);
    if(!resp.ok) throw new Error('not found');
    const svgText = await resp.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const allPaths = Array.from(doc.querySelectorAll('path'));

    if(allPaths.length === 0) throw new Error('no paths');

    const gridHtml = buildStrokeGrid(allPaths, cp);
    if(container) container.outerHTML = gridHtml;
  } catch(e){
    if(container) container.innerHTML = `
      <div style="color:#f88;font-size:.85em;text-align:center;padding:10px;">
        Step-by-step data unavailable.<br>
        <span style="color:#aaa">Try the Animated view instead.</span>
      </div>`;
  }
}

function buildStrokeGrid(paths, cp){
  const size = 109; 
  const steps = paths.length;
  const show = Math.min(steps, 12);
  const step = Math.max(1, Math.floor(steps / show));
  const indices = [];
  for(let i = step-1; i < steps; i += step) indices.push(i);
  if(indices[indices.length-1] !== steps-1) indices.push(steps-1);
  const showIndices = indices.slice(0, 12);

  let cells = showIndices.map(endIdx => {
    let svgPaths = '';
    for(let i=0;i<=endIdx;i++){
      const d = paths[i].getAttribute('d') || '';
      const isNew = i===endIdx;
      svgPaths += `<path d="${d}" stroke="${isNew?'#e55':'#222'}" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
    }
    return `<div class="step-cell">
      <div class="step-num">${endIdx+1}</div>
      <svg viewBox="0 0 ${size} ${size}" width="80" height="80" style="background:#fff;border-radius:6px;">
        ${svgPaths}
      </svg>
    </div>`;
  }).join('');

  return `<div id="steps-container">
    <style>
      #steps-container{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:380px;margin-top:4px;}
      .step-cell{display:flex;flex-direction:column;align-items:center;gap:2px;}
      .step-num{font-size:.7em;color:#666;}
    </style>
    ${cells}
  </div>`;
}

function setStrokeView(v){
  strokeView = v;
  const [k] = kanji[order[idx]];
  document.querySelectorAll('.view-toggle button').forEach(b=>{
    b.classList.toggle('active', b.id === 'vt-'+v);
  });
  renderStrokeVisual(k);
}

function strokeNext(){
  idx = (idx+1)%kanji.length; flipped=false; renderStroke();
}
function strokePrev(){
  idx = (idx-1+kanji.length)%kanji.length; flipped=false; renderStroke();
}

// Initialize
setDeck('all');

</script>
